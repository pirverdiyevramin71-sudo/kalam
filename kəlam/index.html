<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Kəlam | Müqəddəs Kitab</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Saytın öz stilləri -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dark-oled.css">
</head>
<body>
    <!-- ===== BAŞLIQ ===== -->
    <header class="app-header">
        <h1>
            <i class="fas fa-cross"></i>
            Kəlam
        </h1>
        <div class="header-actions">
            <i class="fas fa-search" id="searchIcon"></i>
            <i class="far fa-bell"></i>
        </div>
    </header>

    <!-- ===== AXTARIŞ OVERLAY ===== -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-container">
            <i class="fas fa-arrow-left" id="closeSearch"></i>
            <input type="text" id="globalSearchInput" placeholder="Ayə, kitab və ya açar söz..." autocomplete="off">
        </div>
        <div id="globalSearchResults" class="global-results"></div>
    </div>

    <!-- ===== ƏSAS MƏZMUN ===== -->
    <main id="mainContent">
        
        <!-- Davam Et Bölməsi -->
        <section class="continue-reading-section" id="continueSection">
            <h3>
                <i class="fas fa-history"></i> 
                Davam Et
                <span style="margin-left: auto; font-size: 0.8rem; opacity: 0.6;">
                    <i class="fas fa-chevron-right"></i>
                </span>
            </h3>
            <div class="continue-list" id="continueList">
                <!-- JavaScript ilə doldurulacaq -->
            </div>
        </section>

        <!-- Günün Sözü -->
        <section class="daily-verse-card">
            <div class="card-header">
                <span class="badge">
                    <i class="far fa-calendar-alt"></i> 
                    Günün Kəlamı
                </span>
                <span style="margin-left: auto; font-size: 0.75rem; opacity: 0.6;">
                    <i class="far fa-clock"></i> 
                    <span id="todayDate"></span>
                </span>
            </div>
            <p class="verse-text" id="dailyVerseText">Yüklənir...</p>
            <p class="verse-ref" id="dailyVerseRef"></p>
        </section>

        <!-- Kateqoriyalar -->
        <section class="categories-grid">
            <h3>
                <i class="fas fa-book-bible"></i> 
                Müqəddəs Kitab
            </h3>
            <div class="grid-2">
                <div class="cat-card" data-category="old_testament">
                    <i class="fas fa-scroll"></i>
                    <span>Əhdi-Ətiq</span>
                    <small>39 kitab</small>
                </div>
                <div class="cat-card" data-category="new_testament">
                    <i class="fas fa-dove"></i>
                    <span>Əhdi-Cədid</span>
                    <small>27 kitab</small>
                </div>
            </div>

            <h3 style="margin-top: 30px;">
                <i class="fas fa-bookmark"></i> 
                Digər Kitablar
            </h3>
            <div class="grid-2" id="customBooksGrid">
                <!-- JavaScript ilə doldurulacaq -->
            </div>
            
            <!-- Bütün Kitablar Linki -->
            <div style="text-align: center; margin-top: 24px;">
                <a href="#" class="btn btn-outline" style="padding: 12px 32px;" onclick="alert('Kitablar kitabxanası tezliklə!')">
                    <i class="fas fa-list"></i> Bütün Kitablar
                </a>
            </div>
        </section>
        
        <!-- Boşluq -->
        <div style="height: 20px;"></div>
    </main>

    <!-- ===== ALT NAVİQASİYA ===== -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active" data-page="home">
            <i class="fas fa-home"></i>
            <span>Ana</span>
        </a>
        <a href="#" class="nav-item" data-page="library">
            <i class="fas fa-books"></i>
            <span>Kitablar</span>
        </a>
        <a href="#" class="nav-item" data-page="chat">
            <i class="fas fa-comment-dots"></i>
            <span>Söhbət</span>
        </a>
        <a href="#" class="nav-item" data-page="profile">
            <i class="fas fa-user"></i>
            <span>Profil</span>
        </a>
    </nav>

    <!-- ===== JAVASCRIPT ===== -->
    <!-- Əsas kitabxanalar -->
    <script src="js/storage.js"></script>
    <script src="data/custom_books.js"></script>
    <script src="js/bible-engine.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Əlavə: Tarixi göstər -->
    <script>
        (function() {
            const today = new Date();
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const dateStr = today.toLocaleDateString('az', options);
            const dateEl = document.getElementById('todayDate');
            if (dateEl) dateEl.textContent = dateStr;
            
            // Ayın fazasını göstər (sadə)
            const hour = today.getHours();
            const headerIcon = document.querySelector('.app-header h1 i');
            if (hour >= 20 || hour < 6) {
                // Gecə - ay ikonu
                if (headerIcon) {
                    headerIcon.classList.remove('fa-cross');
                    headerIcon.classList.add('fa-moon');
                }
            }
        })();
    </script>
    
    <!-- PWA Bildiriş Tələbi (Sadə) -->
    <script>
        if ('Notification' in window && Notification.permission === 'default') {
            setTimeout(() => {
                Notification.requestPermission();
            }, 3000);
        }
    </script>
</body>
</html>
